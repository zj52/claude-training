<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 290" role="img" aria-labelledby="vm-title vm-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <title id="vm-title">Claude 3P runs in a sandbox on your computer</title>
  <desc id="vm-desc">Inside your computer, Claude 3P runs in an isolated sandbox VM that can only read and write one folder you select. Everything else on your computer — apps, settings, other files — is unreachable from the VM.</desc>

  <defs>
    <marker id="vm-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B31B1B"/>
    </marker>
  </defs>

  <!-- ─── Outer: YOUR COMPUTER ─── -->
  <rect x="20" y="20" width="680" height="260" rx="14" fill="#f4f4f6" stroke="#9a9a9a" stroke-width="1.5"/>
  <text x="40" y="48" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#666">YOUR COMPUTER</text>

  <!-- Top row: generic content Claude can't touch -->
  <g opacity="0.7">
    <rect x="40" y="64" width="50" height="32" rx="5" fill="#ffffff" stroke="#aaa"/>
    <text x="65" y="85" text-anchor="middle" font-size="9.5" fill="#666">files</text>
    <rect x="100" y="64" width="50" height="32" rx="5" fill="#ffffff" stroke="#aaa"/>
    <text x="125" y="85" text-anchor="middle" font-size="9.5" fill="#666">apps</text>
    <rect x="160" y="64" width="64" height="32" rx="5" fill="#ffffff" stroke="#aaa"/>
    <text x="192" y="85" text-anchor="middle" font-size="9.5" fill="#666">settings</text>
    <rect x="234" y="64" width="60" height="32" rx="5" fill="#ffffff" stroke="#aaa"/>
    <text x="264" y="85" text-anchor="middle" font-size="9.5" fill="#666">other</text>
  </g>
  <text x="310" y="85" font-size="10" font-style="italic" fill="#999">Reads and writes files in your selected folder. Asks before using others.</text>

  <!-- ─── Bottom row: VM (inside computer) + Selected folder (inside computer) ─── -->

  <!-- Sandbox VM -->
  <rect x="50" y="130" width="260" height="130" rx="10" fill="#ffffff" stroke="#B31B1B" stroke-width="2"/>
  <text x="70" y="155" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#B31B1B">ISOLATED VM</text>

  <!-- Claude spark icon -->
  <g transform="translate(180, 200)" stroke="#B31B1B" stroke-width="3" stroke-linecap="round">
    <line x1="0" y1="-22" x2="0" y2="22"/>
    <line x1="-22" y1="0" x2="22" y2="0"/>
    <line x1="-16" y1="-16" x2="16" y2="16"/>
    <line x1="16" y1="-16" x2="-16" y2="16"/>
  </g>
  <text x="180" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#191919">Claude 3P</text>

  <!-- Selected folder -->
  <path d="M 360 150 L 360 240 L 660 240 L 660 150 L 460 150 L 450 138 L 360 138 Z" fill="#ffffff" stroke="#B31B1B" stroke-width="2"/>
  <text x="510" y="190" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="1" fill="#B31B1B">SELECTED FOLDER</text>
  <text x="510" y="210" text-anchor="middle" font-size="10" fill="#666">configured by Cornell</text>

  <!-- Arrow from VM → folder -->
  <line x1="316" y1="195" x2="356" y2="195" stroke="#B31B1B" stroke-width="2" stroke-dasharray="4 3" marker-start="url(#vm-arrow)" marker-end="url(#vm-arrow)"/>
</svg>
