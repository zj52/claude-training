<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <title id="title">Which tool do I use? — Cornell's AI tools by task</title>
  <desc id="desc">Companion diagram pairing each kind of work to the Cornell AI tool to reach for, with cost and data ceiling.</desc>

  <defs>
    <marker id="arrow-carnelian" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B31B1B"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a7a7a"/>
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title block -->
  <g>
    <text x="40" y="48" font-size="14" font-weight="700" letter-spacing="1.5" fill="#B31B1B">CORNELL · AI TOOLS</text>
    <text x="40" y="86" font-size="32" font-weight="700" fill="#191919">Which tool do I use?</text>
    <text x="40" y="118" font-size="16" fill="#555">Cornell offers five AI tools today. Pick by the kind of work you're doing — not by brand or vibe.</text>
  </g>

  <!-- Column headers -->
  <text x="40" y="172" font-size="11" font-weight="700" letter-spacing="2" fill="#808080">IF YOUR WORK INVOLVES…</text>
  <text x="780" y="172" font-size="11" font-weight="700" letter-spacing="2" fill="#808080">REACH FOR</text>
  <line x1="40" y1="180" x2="1560" y2="180" stroke="#191919" stroke-opacity="0.10" stroke-width="1"/>

  <!-- ─── Row 1: Confidential admin data → Claude 3P (highlighted) ─── -->
  <g transform="translate(0, 200)">
    <!-- subtle row highlight for today's tool -->
    <rect x="40" y="0" width="1520" height="110" rx="14" fill="#fdf4f4" stroke="#B31B1B" stroke-opacity="0.18" stroke-width="1.5"/>
    <!-- icon: shield -->
    <g transform="translate(80, 30)">
      <path d="M30 0 L60 12 L60 36 Q60 56 30 70 Q0 56 0 36 L0 12 Z" fill="#B31B1B"/>
      <path d="M16 32 L26 42 L46 22" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- task description -->
    <text x="180" y="46" font-size="18" font-weight="700" fill="#191919">Confidential admin data</text>
    <text x="180" y="70" font-size="13" fill="#555">Protocols, awards, proposals, IP, personnel — anything moderate-risk.</text>
    <text x="180" y="92" font-size="12" font-style="italic" fill="#808080">Also fine for non-confidential work.</text>
    <!-- arrow -->
    <line x1="700" y1="55" x2="780" y2="55" stroke="#B31B1B" stroke-width="3" marker-end="url(#arrow-carnelian)"/>
    <!-- tool card -->
    <g filter="url(#card-shadow)">
      <rect x="820" y="0" width="740" height="110" rx="14" fill="#ffffff" stroke="#B31B1B" stroke-width="2.5"/>
      <!-- ribbon -->
      <rect x="820" y="0" width="740" height="22" rx="14" fill="#B31B1B"/>
      <rect x="820" y="12" width="740" height="10" fill="#B31B1B"/>
      <text x="1190" y="16" font-size="10" font-weight="700" letter-spacing="1.5" fill="#ffffff" text-anchor="middle">★ TODAY&apos;S TOOL</text>
      <text x="840" y="58" font-size="19" font-weight="700" fill="#191919">Claude 3P</text>
      <text x="840" y="80" font-size="12.5" fill="#555">Claude Desktop w/ Third-Party Inference · Cornell-protected.</text>
      <!-- pills -->
      <rect x="1240" y="44" width="90" height="22" rx="11" fill="#B31B1B"/>
      <text x="1285" y="59" font-size="10.5" font-weight="700" fill="#ffffff" text-anchor="middle">PAID · PER USE</text>
      <rect x="1340" y="44" width="200" height="22" rx="11" fill="#fdecec" stroke="#B31B1B" stroke-opacity="0.35"/>
      <text x="1440" y="59" font-size="10.5" font-weight="700" fill="#8C1515" text-anchor="middle">CONFIDENTIAL / MOD-RISK OK</text>
    </g>
  </g>

  <!-- ─── Row 2: Everyday chat / public → Copilot Chat ─── -->
  <g transform="translate(0, 330)">
    <rect x="40" y="0" width="1520" height="110" rx="14" fill="#ffffff" stroke="#191919" stroke-opacity="0.10" stroke-width="1.5"/>
    <!-- icon: chat bubble -->
    <g transform="translate(80, 30)">
      <path d="M0 12 Q0 0 12 0 L48 0 Q60 0 60 12 L60 38 Q60 50 48 50 L24 50 L10 64 L14 50 L12 50 Q0 50 0 38 Z" fill="#5a5a5a"/>
      <circle cx="18" cy="25" r="3.5" fill="#ffffff"/>
      <circle cx="30" cy="25" r="3.5" fill="#ffffff"/>
      <circle cx="42" cy="25" r="3.5" fill="#ffffff"/>
    </g>
    <text x="180" y="46" font-size="18" font-weight="700" fill="#191919">Everyday questions on public info</text>
    <text x="180" y="70" font-size="13" fill="#555">Drafts, edits, summaries, brainstorming, learning — nothing confidential.</text>
    <line x1="700" y1="55" x2="780" y2="55" stroke="#7a7a7a" stroke-width="2" marker-end="url(#arrow-muted)"/>
    <g>
      <text x="840" y="46" font-size="19" font-weight="700" fill="#191919">Microsoft 365 Copilot Chat</text>
      <text x="840" y="68" font-size="12.5" fill="#555">Cornell&apos;s baseline staff assistant. Sign in with your Cornell account.</text>
      <text x="840" y="88" font-size="11.5" font-style="italic" fill="#808080">Moderate-risk approval in flight.</text>
      <rect x="1310" y="44" width="60" height="22" rx="11" fill="#eef7ef" stroke="#2a7a3d" stroke-opacity="0.35"/>
      <text x="1340" y="59" font-size="10.5" font-weight="700" fill="#2a7a3d" text-anchor="middle">FREE</text>
      <rect x="1380" y="44" width="160" height="22" rx="11" fill="#eeeef2" stroke="#191919" stroke-opacity="0.12"/>
      <text x="1460" y="59" font-size="10.5" font-weight="700" fill="#2a2a2a" text-anchor="middle">PUBLIC DATA TODAY</text>
    </g>
  </g>

  <!-- ─── Row 3: Meeting summaries → Zoom AI Companion ─── -->
  <g transform="translate(0, 460)">
    <rect x="40" y="0" width="1520" height="110" rx="14" fill="#ffffff" stroke="#191919" stroke-opacity="0.10" stroke-width="1.5"/>
    <!-- icon: meeting / waveform -->
    <g transform="translate(80, 30)">
      <rect x="0" y="0" width="60" height="50" rx="8" fill="#5a5a5a"/>
      <rect x="10" y="20" width="3" height="10" fill="#ffffff"/>
      <rect x="17" y="14" width="3" height="22" fill="#ffffff"/>
      <rect x="24" y="10" width="3" height="30" fill="#ffffff"/>
      <rect x="31" y="14" width="3" height="22" fill="#ffffff"/>
      <rect x="38" y="18" width="3" height="14" fill="#ffffff"/>
      <rect x="45" y="22" width="3" height="6" fill="#ffffff"/>
    </g>
    <text x="180" y="46" font-size="18" font-weight="700" fill="#191919">A meeting you want to recap</text>
    <text x="180" y="70" font-size="13" fill="#555">Summaries, transcripts, action items — built into the Zoom call.</text>
    <line x1="700" y1="55" x2="780" y2="55" stroke="#7a7a7a" stroke-width="2" marker-end="url(#arrow-muted)"/>
    <g>
      <text x="840" y="46" font-size="19" font-weight="700" fill="#191919">Zoom AI Companion</text>
      <text x="840" y="72" font-size="12.5" fill="#555">Turn on in your Zoom client. Data handled per Cornell&apos;s Zoom approvals.</text>
      <rect x="1480" y="44" width="60" height="22" rx="11" fill="#eef7ef" stroke="#2a7a3d" stroke-opacity="0.35"/>
      <text x="1510" y="59" font-size="10.5" font-weight="700" fill="#2a7a3d" text-anchor="middle">FREE</text>
    </g>
  </g>

  <!-- ─── Row 4: Image generation → Adobe Firefly ─── -->
  <g transform="translate(0, 590)">
    <rect x="40" y="0" width="1520" height="110" rx="14" fill="#ffffff" stroke="#191919" stroke-opacity="0.10" stroke-width="1.5"/>
    <!-- icon: image frame with mountain -->
    <g transform="translate(80, 30)">
      <rect x="0" y="0" width="60" height="50" rx="6" fill="#5a5a5a"/>
      <circle cx="16" cy="14" r="4" fill="#ffffff"/>
      <path d="M4 42 L22 22 L36 36 L46 28 L56 42 Z" fill="#ffffff"/>
    </g>
    <text x="180" y="46" font-size="18" font-weight="700" fill="#191919">An image you want to generate</text>
    <text x="180" y="70" font-size="13" fill="#555">Stock-style images, simple edits, mock-ups — for public-facing work.</text>
    <text x="180" y="92" font-size="12" font-style="italic" fill="#808080">Though other tools can generate images, Firefly is the specialist.</text>
    <line x1="700" y1="55" x2="780" y2="55" stroke="#7a7a7a" stroke-width="2" marker-end="url(#arrow-muted)"/>
    <g>
      <text x="840" y="46" font-size="19" font-weight="700" fill="#191919">Adobe Firefly</text>
      <text x="840" y="72" font-size="12.5" fill="#555">Included in the Cornell Adobe license. Image generation and edits.</text>
      <rect x="1480" y="44" width="60" height="22" rx="11" fill="#eef7ef" stroke="#2a7a3d" stroke-opacity="0.35"/>
      <text x="1510" y="59" font-size="10.5" font-weight="700" fill="#2a7a3d" text-anchor="middle">FREE</text>
    </g>
  </g>

  <!-- ─── Row 5: Custom workflow → Cornell AI Platform ─── -->
  <g transform="translate(0, 720)">
    <rect x="40" y="0" width="1520" height="110" rx="14" fill="#ffffff" stroke="#191919" stroke-opacity="0.10" stroke-width="1.5"/>
    <!-- icon: connected nodes -->
    <g transform="translate(80, 30)">
      <line x1="14" y1="14" x2="46" y2="14" stroke="#5a5a5a" stroke-width="3"/>
      <line x1="14" y1="14" x2="30" y2="44" stroke="#5a5a5a" stroke-width="3"/>
      <line x1="46" y1="14" x2="30" y2="44" stroke="#5a5a5a" stroke-width="3"/>
      <circle cx="14" cy="14" r="8" fill="#5a5a5a"/>
      <circle cx="46" cy="14" r="8" fill="#5a5a5a"/>
      <circle cx="30" cy="44" r="8" fill="#5a5a5a"/>
    </g>
    <text x="180" y="46" font-size="18" font-weight="700" fill="#191919">A custom workflow or automation</text>
    <text x="180" y="70" font-size="13" fill="#555">Multi-step pipelines, agents, integrations — for builders and developers.</text>
    <line x1="700" y1="55" x2="780" y2="55" stroke="#7a7a7a" stroke-width="2" marker-end="url(#arrow-muted)"/>
    <g>
      <text x="840" y="46" font-size="19" font-weight="700" fill="#191919">Cornell AI Platform</text>
      <text x="840" y="72" font-size="12.5" fill="#555">AI Agents Studio + LLM API Gateway + protected clouds.</text>
      <rect x="1240" y="44" width="90" height="22" rx="11" fill="#B31B1B"/>
      <text x="1285" y="59" font-size="10.5" font-weight="700" fill="#ffffff" text-anchor="middle">PAID · PER USE</text>
      <rect x="1340" y="44" width="100" height="22" rx="11" fill="#eeeef2" stroke="#191919" stroke-opacity="0.12"/>
      <text x="1390" y="59" font-size="10.5" font-weight="700" fill="#2a2a2a" text-anchor="middle">PILOT</text>
      <rect x="1450" y="44" width="90" height="22" rx="11" fill="#eeeef2" stroke="#191919" stroke-opacity="0.12"/>
      <text x="1495" y="59" font-size="10.5" font-weight="700" fill="#2a2a2a" text-anchor="middle">BUILDERS</text>
    </g>
  </g>

  <!-- ─── Bottom callout: out of scope ─── -->
  <g transform="translate(0, 870)">
    <rect x="40" y="0" width="1520" height="100" rx="14" fill="#fdecec" stroke="#B31B1B" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="72" y="34" font-size="13" font-weight="700" letter-spacing="2" fill="#8C1515">OUT OF SCOPE FOR ALL OF THESE TOOLS</text>
    <text x="72" y="62" font-size="15" fill="#191919"><tspan font-weight="700">HIPAA, FERPA, export-controlled, or other high-risk data?</tspan> None of these tools.</text>
    <text x="72" y="84" font-size="13" fill="#555">Email <tspan font-weight="600" fill="#8C1515">ai-support@cornell.edu</tspan> before using AI on this kind of data. Full inventory: AI Innovation Hub.</text>
  </g>
</svg>
