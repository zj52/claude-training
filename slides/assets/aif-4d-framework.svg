<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="aif4d-title aif4d-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <title id="aif4d-title">The AI Fluency 4D Framework</title>
  <desc id="aif4d-desc">Four interconnected competencies for working with AI effectively, efficiently, ethically, and safely: Delegation, Description, Discernment, and Diligence. Adapted from the AI Fluency Framework by Dakan, Feller, and Anthropic.</desc>

  <defs>
    <clipPath id="card-tl"><rect x="80" y="265" width="690" height="220" rx="16"/></clipPath>
    <clipPath id="card-tr"><rect x="830" y="265" width="690" height="220" rx="16"/></clipPath>
    <clipPath id="card-bl"><rect x="80" y="555" width="690" height="220" rx="16"/></clipPath>
    <clipPath id="card-br"><rect x="830" y="555" width="690" height="220" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>

  <!-- Eyebrow + Title -->
  <text x="80" y="80" font-size="14" font-weight="700" letter-spacing="2.4" fill="#B31B1B">THE 4D FRAMEWORK</text>
  <text x="80" y="138" font-size="52" font-weight="700" fill="#1a1a1a">AI Fluency.</text>
  <text x="80" y="190" font-size="22" fill="#444">Four interconnected competencies for working with AI effectively, efficiently, ethically, and safely.</text>

  <!-- ─── Top row label: the responsibility loop ─── -->
  <text x="80" y="240" font-size="14" font-weight="700" letter-spacing="2.2" fill="#7a5e3a">DELEGATION + DILIGENCE  ·  WHEN AND WHETHER TO USE AI</text>

  <!-- Card 1: Delegation (top-left) -->
  <g clip-path="url(#card-tl)">
    <rect x="80" y="265" width="690" height="220" fill="#f5efe6"/>
    <rect x="80" y="265" width="220" height="220" fill="#B31B1B"/>
  </g>
  <text x="190" y="385" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Delegation</text>
  <text x="325" y="360" font-size="22" fill="#2c2c2c">
    <tspan x="325" dy="0">Setting goals and deciding whether,</tspan>
    <tspan x="325" dy="32">when, and how to engage with AI.</tspan>
  </text>

  <!-- Card 2: Diligence (top-right) -->
  <g clip-path="url(#card-tr)">
    <rect x="830" y="265" width="690" height="220" fill="#f5efe6"/>
    <rect x="830" y="265" width="220" height="220" fill="#B31B1B"/>
  </g>
  <text x="940" y="385" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Diligence</text>
  <text x="1075" y="360" font-size="22" fill="#2c2c2c">
    <tspan x="1075" dy="0">Taking responsibility for what we do</tspan>
    <tspan x="1075" dy="32">with AI and how we do it.</tspan>
  </text>

  <!-- ─── Bottom row label: the interaction loop ─── -->
  <text x="80" y="530" font-size="14" font-weight="700" letter-spacing="2.2" fill="#7a5e3a">DESCRIPTION + DISCERNMENT  ·  HOW TO INTERACT WITH AI</text>

  <!-- Card 3: Description (bottom-left) -->
  <g clip-path="url(#card-bl)">
    <rect x="80" y="555" width="690" height="220" fill="#f5efe6"/>
    <rect x="80" y="555" width="220" height="220" fill="#B31B1B"/>
  </g>
  <text x="190" y="675" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Description</text>
  <text x="325" y="650" font-size="22" fill="#2c2c2c">
    <tspan x="325" dy="0">Effectively describing goals to prompt</tspan>
    <tspan x="325" dy="32">useful AI behaviors and outputs.</tspan>
  </text>

  <!-- Card 4: Discernment (bottom-right) -->
  <g clip-path="url(#card-br)">
    <rect x="830" y="555" width="690" height="220" fill="#f5efe6"/>
    <rect x="830" y="555" width="220" height="220" fill="#B31B1B"/>
  </g>
  <text x="940" y="675" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Discernment</text>
  <text x="1075" y="650" font-size="22" fill="#2c2c2c">
    <tspan x="1075" dy="0">Accurately assessing the usefulness</tspan>
    <tspan x="1075" dy="32">of AI outputs and behaviors.</tspan>
  </text>

  <!-- Attribution footer -->
  <text x="80" y="855" font-size="14" font-style="italic" fill="#666">Adapted from the AI Fluency Framework by Rick Dakan, Joseph Feller, and Anthropic. Released under CC BY-NC-SA 4.0.</text>
</svg>
